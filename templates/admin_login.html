<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#1a1d27;border:1px solid #2d3142;border-radius:12px;
          padding:48px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .icon{width:56px;height:56px;background:linear-gradient(135deg,#1877F2,#42b72a);
          border-radius:14px;display:flex;align-items:center;justify-content:center;
          margin:0 auto 12px;font-size:28px}
    h1{color:#e8eaf0;font-size:22px;font-weight:700;text-align:center}
    p{color:#6b7280;font-size:13px;text-align:center;margin-top:4px;margin-bottom:28px}
    label{display:block;color:#9ca3af;font-size:13px;font-weight:500;margin-bottom:6px}
    input[type=password]{width:100%;padding:12px 14px;background:#0f1117;
                         border:1px solid #2d3142;border-radius:8px;color:#e8eaf0;
                         font-size:15px;outline:none;transition:border-color .2s}
    input[type=password]:focus{border-color:#1877F2}
    .btn{width:100%;padding:13px;background:#1877F2;color:#fff;border:none;
         border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;
         margin-top:20px;transition:background .2s}
    .btn:hover{background:#166fe5}
    .err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
         color:#f87171;border-radius:6px;padding:10px 14px;font-size:13px;margin-top:14px}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Admin Panel</h1>
    <p>Secure access only</p>
    <form method="post">
      <label for="pw">Password</label>
      <input type="password" id="pw" name="password" placeholder="Enter admin password" autofocus required>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
